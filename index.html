<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אפליקציית הכפל של ליה ✨</title>
    <style>
        :root { --main: #ff66b2; --secondary: #9b59b6; --bg: #fdf2f8; --white: #ffffff; --accent: #ffd1dc; --gold: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
        
        .dashboard { background: var(--white); padding: 15px; border-bottom: 4px solid var(--main); display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stats-row { display: flex; justify-content: space-around; align-items: center; }
        .stat-num { font-size: 1.8rem; font-weight: 900; color: var(--main); display: block; text-align: center; }
        .stat-label { font-size: 0.8rem; font-weight: bold; color: var(--secondary); }

        .progress-section { padding: 5px 15px; }
        .progress-bar-bg { background: #eee; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-bar-fill { background: var(--main); height: 100%; width: 0%; transition: 0.5s; }

        .targets-map { display: flex; justify-content: space-around; background: #fff; margin: 10px; padding: 10px; border-radius: 15px; border: 1px solid var(--accent); }
        .target-item { font-size: 0.75rem; text-align: center; opacity: 0.4; }
        .target-item.active { opacity: 1; transform: scale(1.05); font-weight: bold; color: var(--main); }

        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 20px; text-align: center; box-sizing: border-box; position: relative; }
        .title { font-size: 2.2rem; color: var(--secondary); margin-bottom: 20px; font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-diff { background: var(--accent); color: var(--text); }
        .btn-diff.active { background: var(--main); color: white; }
        .btn-start { background: #4caf50; color: white; width: 220px; font-size: 1.5rem; margin-top: 15px; }

        #gameArea { display: none; }
        .top-btns { position: absolute; top: 10px; width: 90%; display: flex; justify-content: space-between; }
        .icon-btn { background: white; border: 2px solid var(--main); border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .question { font-size: 6rem; font-weight: 900; margin: 5px 0; }
        input { border: 5px solid var(--main); border-radius: 20px; width: 220px; font-size: 4rem; text-align: center; outline: none; background: white; }

        .sync-box { margin-top: 20px; font-size: 0.8rem; background: #eee; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="syncOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; color:white; padding:20px; text-align:center; direction:rtl;">
    <h3>העברת התקדמות מכשיר 📲</h3>
    <p>כדי להעביר את המדליות למכשיר אחר, העתיקי את הקוד:</p>
    <input id="exportCode" style="font-size:1rem; width:100%; border:none; padding:10px;" readonly>
    <p>כדי לטעון קוד ממכשיר אחר, הדביקי אותו כאן:</p>
    <input id="importCode" style="font-size:1rem; width:100%; border:none; padding:10px;" placeholder="הדביקי קוד כאן">
    <br><br>
    <button class="btn" onclick="importData()" style="background:var(--main); color:white;">טעינת נתונים</button>
    <button class="btn" onclick="document.getElementById('syncOverlay').style.display='none'" style="background:gray; color:white;">סגור</button>
</div>

<div class="dashboard">
    <div class="stats-row">
        <div class="stat-item"><span class="stat-num" id="score">0</span><span class="stat-label">⭐ נקודות</span></div>
        <div class="stat-item"><span class="stat-num" id="medals">0</span><span class="stat-label">🎖️ מדליות</span></div>
        <div class="stat-item"><span class="stat-num" id="trophies">0</span><span class="stat-label">🏆 גביעים</span></div>
    </div>
    <div class="progress-section">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="barFill"></div></div>
    </div>
</div>

<div class="targets-map">
    <div class="target-item" id="t1">🎖️<br>מדליה</div>
    <div class="target-item" id="t2">🏆<br>גביע</div>
    <div class="target-item" id="t3">🎁<br>הפתעה!</div>
</div>

<div class="screen" id="lobby">
    <div class="title">האפליקציה של ליה ✨</div>
    <div class="btn-group">
        <button class="btn btn-diff active" id="d1" onclick="setDiff(1)">קליל (עד 5)</button>
        <button class="btn btn-diff" id="d2" onclick="setDiff(2)">בינוני (עד 10)</button>
        <button class="btn btn-diff" id="d3" onclick="setDiff(3)">מאתגר (עד 15)</button>
    </div>
    <button class="btn btn-start" onclick="startGame()">בואי נשחק! 🚀</button>
    <div class="sync-box" onclick="showSync()">לחצי כאן להעברת הנתונים למכשיר אחר 🔄</div>
</div>

<div class="screen" id="gameArea">
    <div class="top-btns">
        <button class="icon-btn" onclick="goHome()">🏠</button>
        <button class="icon-btn" onclick="showSync()">🔄</button>
    </div>
    <div id="emoji" style="font-size:4rem; height:80px;"></div>
    <div class="question" id="q"></div>
    <input type="number" id="ans" inputmode="numeric">
    <button class="btn btn-start" onclick="check()" style="background:#4caf50;">בדיקה ✅</button>
</div>

<script>
    let s = parseInt(localStorage.getItem('liaScore')) || 0;
    let diff = 1, n1, n2, ansVal;

    updateStats();

    function setDiff(d) { diff = d; for(let i=1; i<=3; i++) document.getElementById('d'+i).classList.toggle('active', i===d); }
    function startGame() { document.getElementById('lobby').style.display='none'; document.getElementById('gameArea').style.display='flex'; next(); }
    function goHome() { document.getElementById('lobby').style.display='flex'; document.getElementById('gameArea').style.display='none'; }

    function next() {
        if (diff === 1) { n1 = Math.floor(Math.random() * 4) + 2; n2 = Math.floor(Math.random() * 9) + 2; }
        else if (diff === 2) { n1 = Math.floor(Math.random() * 5) + 6; n2 = Math.floor(Math.random() * 9) + 2; }
        else { n1 = Math.floor(Math.random() * 6) + 10; n2 = Math.floor(Math.random() * 11) + 2; }
        ansVal = n1 * n2;
        document.getElementById('q').innerText = `${n1} × ${n2}`;
        document.getElementById('ans').value = ""; document.getElementById('ans').focus();
    }

    function check() {
        if(parseInt(document.getElementById('ans').value) === ansVal) {
            s++; localStorage.setItem('liaScore', s); updateStats();
            document.getElementById('emoji').innerText = "😊";
            setTimeout(next, 800);
        } else { document.getElementById('emoji').innerText = "😟"; }
    }

    function updateStats() {
        document.getElementById('score').innerText = s;
        let m = Math.floor(s/10), t = Math.floor(m/10);
        document.getElementById('medals').innerText = m;
        document.getElementById('trophies').innerText = t;
        document.getElementById('barFill').style.width = (s % 10) * 10 + "%";
        if(s >= 10) document.getElementById('t1').classList.add('active');
        if(s >= 100) document.getElementById('t2').classList.add('active');
        if(s >= 500) { document.getElementById('t3').classList.add('active'); alert("הפתעה מאבא ואמא! 🎁"); }
    }

    // פונקציות סנכרון
    function showSync() {
        document.getElementById('syncOverlay').style.display = 'flex';
        document.getElementById('exportCode').value = btoa(s); // קידוד פשוט של הניקוד
    }

    function importData() {
        try {
            let code = document.getElementById('importCode').value;
            let newScore = parseInt(atob(code));
            if(!isNaN(newScore)) {
                s = newScore;
                localStorage.setItem('liaScore', s);
                updateStats();
                alert("הנתונים נטענו בהצלחה! ✨");
                document.getElementById('syncOverlay').style.display = 'none';
            }
        } catch(e) { alert("קוד לא תקין!"); }
    }

    document.getElementById('ans').addEventListener('keypress', (e) => { if(e.key==='Enter') check(); });
</script>
</body>
</html>
